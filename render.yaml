services:
  - type: web
    name: snapic-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn snapic.main:app --host 0.0.0.0 --port $PORT --app-dir src
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: ALLOWED_ORIGINS
        sync: false
